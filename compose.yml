services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "https://mirrors.dotsrc.org/osdn/android-x86/71931/android-x86_64-9.0-rc1.iso"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "28G"
      MANUAL: "Y"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
    restart: always
    stop_grace_period: 2m
